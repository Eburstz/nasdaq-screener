name: NASDAQ 100 Screener

on:
  # Run daily at 9:30 PM UTC (4:30 PM ET — 30 min after market close)
  schedule:
    - cron: '30 21 * * 1-5'

  # Allow manual trigger from GitHub UI
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run screener
        env:
          ALERT_EMAIL_FROM: ${{ secrets.ALERT_EMAIL_FROM }}
          ALERT_EMAIL_PASSWORD: ${{ secrets.ALERT_EMAIL_PASSWORD }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
        run: python nasdaq_screener.py docs/index.html

      - name: Commit and push results
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add docs/index.html
          if [ -f previous_signals.json ]; then
            git add previous_signals.json
          fi
          git diff --staged --quiet || git commit -m "Update screener dashboard — $(date +'%Y-%m-%d %H:%M UTC')"
          git push
